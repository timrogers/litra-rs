name: Bug Report
description: Report a bug
labels: ["bug"]
assignees: "@copilot"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `litra ...`
        2. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: The version of litra you are using (run `litra --version`).
      placeholder: e.g. 0.9.0
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating system
      description: The OS and version you are running on.
      placeholder: e.g. Ubuntu 24.04, macOS 15.2, Windows 11
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any other context about the problem (logs, screenshots, etc.).
    validations:
      required: false
